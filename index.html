<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信息学业水平测试 - 练习版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px}
.start-screen{text-align:center;padding-top:40px}
.start-screen h1{font-size:2em;color:#1a1a1a;margin-bottom:8px}
.start-screen .subtitle{font-size:1em;color:#666;margin-bottom:24px}
.start-screen .info{background:#fff;border-radius:12px;padding:22px;margin-bottom:22px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.start-screen .info p{font-size:1.05em;color:#333;margin:8px 0}
.type-tags{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:12px 0}
.type-tag{padding:5px 14px;border-radius:20px;font-size:.88em;background:#e8eaff;color:#667eea}
.exam-hint{color:#888;font-size:.88em;margin-bottom:14px}
.exam-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:16px 0}
.exam-btn{padding:14px 8px;border:2px solid #e4e6eb;border-radius:10px;background:#fff;cursor:pointer;text-align:center;transition:all .2s}
.exam-btn:hover{border-color:#667eea;background:#f8f9ff}
.exam-btn.active{border-color:#667eea;background:#667eea;color:#fff}
.exam-btn .num{font-weight:bold;font-size:1.1em}
.exam-btn .desc{font-size:.78em;color:#888;margin-top:3px}
.exam-btn.active .desc{color:rgba(255,255,255,.8)}
.btn{display:inline-block;padding:13px 38px;font-size:1.05em;color:#fff;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:50px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,.4)}
.btn:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}
.quiz-screen{display:none}
.progress-bar{background:#e4e6eb;border-radius:10px;height:6px;margin-bottom:14px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#667eea,#764ba2);height:100%;transition:width .3s;border-radius:10px}
.question-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.question-counter{color:#888;font-size:.88em}
.question-type{background:#667eea;color:#fff;padding:3px 12px;border-radius:12px;font-size:.82em}
.question-card{background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.question-text{font-size:1.08em;color:#1a1a1a;line-height:1.7;margin-bottom:14px}
.options{display:flex;flex-direction:column;gap:7px}
.option-btn{padding:11px 14px;font-size:1em;border:2px solid #e4e6eb;border-radius:8px;background:#fff;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:9px}
.option-btn:hover{border-color:#667eea;background:#f8f9ff}
.option-btn.selected{border-color:#667eea;background:#667eea;color:#fff}
.option-btn .letter{width:25px;height:25px;border-radius:50%;background:#f0f2f5;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.88em;flex-shrink:0}
.option-btn.selected .letter{background:rgba(255,255,255,.3)}
.option-btn .opt-text{flex:1;line-height:1.5}
.tf-options{display:flex;gap:10px}
.tf-btn{flex:1;padding:12px;font-size:1.05em;border:2px solid #e4e6eb;border-radius:8px;background:#fff;cursor:pointer;text-align:center;transition:all .2s}
.tf-btn:hover{border-color:#667eea}
.tf-btn.selected{border-color:#667eea;background:#667eea;color:#fff}
.blank-item{margin-bottom:10px;display:flex;align-items:center;gap:8px}
.blank-num{font-weight:bold;color:#667eea;min-width:28px}
.blank-input{flex:1;border:2px solid #e4e6eb;border-radius:8px;padding:9px 13px;font-size:1em;outline:none;transition:border-color .2s}
.blank-input:focus{border-color:#667eea}
.match-container{display:flex;gap:16px;margin-top:8px}
.match-col{flex:1}
.match-label{font-size:.85em;color:#888;margin-bottom:6px;font-weight:bold}
.match-item{padding:9px 12px;border:2px solid #e4e6eb;border-radius:8px;margin-bottom:6px;background:#fff;cursor:pointer;font-size:.95em;transition:all .2s}
.match-item:hover{border-color:#667eea}
.match-item.active{border-color:#667eea;background:#e8eaff}
.match-item.connected{border-color:#52c41a;background:#f6ffed}
.match-item .mi-num{font-weight:bold;color:#667eea;margin-right:6px}
.nav-buttons{display:flex;justify-content:center;gap:10px;margin-top:20px}
.nav-btn{padding:9px 22px;font-size:.92em;border:none;border-radius:20px;cursor:pointer;transition:all .2s}
.nav-btn.prev{background:#e4e6eb;color:#333}
.nav-btn.next{background:#667eea;color:#fff}
.nav-btn.submit{background:#ff6b6b;color:#fff}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
.result-screen{display:none;text-align:center;padding-top:40px}
.result-card{background:#fff;border-radius:16px;padding:28px;max-width:480px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.score-circle{width:130px;height:130px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;color:#fff}
.score-circle .score{font-size:2.4em;font-weight:bold}
.score-circle .total{font-size:1em;opacity:.9}
.score-circle .label{font-size:.82em;opacity:.8;margin-top:3px}
.result-message{font-size:1.15em;color:#333;margin-bottom:18px}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;text-align:left}
.stat-item{background:#f8f9ff;padding:10px;border-radius:8px}
.stat-item .label{color:#888;font-size:.82em}
.stat-item .value{font-size:1.2em;font-weight:bold;color:#333}
.stat-item .value.correct{color:#52c41a}
.stat-item .value.wrong{color:#ff6b6b}
.answer-review{margin-top:18px;text-align:left}
.review-item{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;background:#f8f9ff;border-radius:8px;margin-bottom:5px}
.review-item .num{font-weight:bold;font-size:.95em;color:#667eea;min-width:26px}
.review-item .result{font-size:.78em;padding:2px 7px;border-radius:4px;margin-left:auto;flex-shrink:0}
.review-item .result.right{background:#d4edda;color:#155724}
.review-item .result.wrong{background:#f8d7da;color:#721c24}
.review-item .user-answer{font-size:.85em;color:#333}
.review-item .user-answer.wrong span{color:#ff6b6b}
.review-item .user-answer.right span{color:#52c41a}
</style>
</head>
<body>
<div class="container">
  <div class="start-screen" id="startScreen">
    <h1>📚 信息学业水平测试</h1>
    <p class="subtitle">2026 练习版题库 · 755道全覆盖 · 20套试卷</p>
    <div class="info">
      <p>📂 题型包含：</p>
      <div class="type-tags">
        <span class="type-tag">单选题</span>
        <span class="type-tag">判断题</span>
        <span class="type-tag">填空题</span>
        <span class="type-tag">连线题</span>
      </div>
      <p class="exam-hint">选择一套试卷答题（每套36~39题，题型按比例分配，20套覆盖全部755题）</p>
      <div class="exam-grid" id="examGrid"></div>
    </div>
    <button class="btn" id="startBtn" onclick="startQuiz()" disabled>开始答题</button>
  </div>

  <div class="quiz-screen" id="quizScreen">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="question-meta">
      <span class="question-counter" id="questionCounter"></span>
      <span class="question-type" id="questionType"></span>
    </div>
    <div class="question-card">
      <div class="question-text" id="questionText"></div>
      <div id="answerArea"></div>
    </div>
    <div class="nav-buttons">
      <button class="nav-btn prev" id="prevBtn" onclick="prevQuestion()" disabled>上一题</button>
      <button class="nav-btn next" id="nextBtn" onclick="nextQuestion()">下一题</button>
      <button class="nav-btn submit" id="submitBtn" onclick="submitQuiz()" style="display:none;">交卷</button>
    </div>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-card">
      <div class="score-circle">
        <span class="score" id="finalScore">0</span>
        <span class="total" id="totalDisplay">/0</span>
        <span class="label">得分</span>
      </div>
      <p class="result-message" id="resultMessage"></p>
      <div class="result-stats">
        <div class="stat-item"><div class="label">正确</div><div class="value correct" id="correctCount">0</div></div>
        <div class="stat-item"><div class="label">错误</div><div class="value wrong" id="wrongCount">0</div></div>
        <div class="stat-item"><div class="label">正确率</div><div class="value" id="accuracy">0%</div></div>
        <div class="stat-item"><div class="label">用时</div><div class="value" id="timeUsed">0分0秒</div></div>
      </div>
      <button class="btn" onclick="restartQuiz()">返回选卷</button>
    </div>
    <div class="answer-review" id="answerReview">
      <h3 style="font-size:1em;color:#333;margin:18px 0 10px 4px;">📝 答案回顾</h3>
      <div id="reviewList"></div>
    </div>
  </div>
</div>

<script>
let allExams={},currentExam=null,currentQuestions=[],currentIndex=0,userAnswers={},startTime=null;
let matchSelected=null;
const T={single:'单选题',judge:'判断题',fill:'填空题',match:'连线题'};

async function loadExams(){
  try{
    const r=await fetch('exams.json');
    allExams=await r.json();
    renderGrid();
  }catch(e){console.error('加载失败:',e);}
}

function renderGrid(){
  const g=document.getElementById('examGrid');
  let h='';
  for(let i=1;i<=20;i++){
    const qs=allExams[i];
    if(!qs)continue;
    const tc={};qs.forEach(q=>{const t=q.type||'single';tc[t]=(tc[t]||0)+1;});
    const desc=[tc.single?`单选${tc.single}`:null,tc.judge?`判断${tc.judge}`:null,tc.fill?`填空${tc.fill}`:null,tc.match?`连线${tc.match}`:null].filter(Boolean).join(' ');
    h+=`<div class="exam-btn" onclick="selectExam(${i},this)" id="eb${i}"><div class="num">第${i}套</div><div class="desc">${qs.length}题 · ${desc}</div></div>`;
  }
  g.innerHTML=h;
}

function selectExam(n,el){
  currentExam=n;
  document.querySelectorAll('.exam-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('startBtn').disabled=false;
}

function startQuiz(){
  if(!currentExam)return;
  currentQuestions=allExams[currentExam];
  currentIndex=0;userAnswers={};startTime=Date.now();
  document.getElementById('startScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  showQuestion();
}

function showQuestion(){
  const q=currentQuestions[currentIndex];
  const total=currentQuestions.length;
  document.getElementById('questionCounter').textContent=`第 ${currentIndex+1}/${total} 题`;
  document.getElementById('questionType').textContent=T[q.type]||'单选题';
  document.getElementById('progressFill').style.width=((currentIndex+1)/total*100)+'%';
  document.getElementById('questionText').textContent=q.question;
  const area=document.getElementById('answerArea');
  area.innerHTML='';
  if(!userAnswers[currentIndex])userAnswers[currentIndex]=(q.type==='match'?{}:null);

  if(q.type==='single'){
    let h='<div class="options">';
    Object.entries(q.options).forEach(([k,v])=>{
      const s=userAnswers[currentIndex]===k?' selected':'';
      h+=`<button class="option-btn${s}" onclick="selSingle('${k}')"><span class="letter">${k}</span><span class="opt-text">${v}</span></button>`;
    });
    h+='</div>';area.innerHTML=h;
  }else if(q.type==='judge'){
    let h='<div class="tf-options">';
    ['对','错'].forEach(v=>{
      const s=userAnswers[currentIndex]===v?' selected':'';
      h+=`<button class="tf-btn${s}" onclick="selSingle('${v}')">${v}</button>`;
    });
    h+='</div>';area.innerHTML=h;
  }else if(q.type==='fill'){
    const parts=q.answer.split('|');
    let h='';
    parts.forEach((v,i)=>{
      const num=String.fromCharCode(0x2460+i);
      const val=(userAnswers[currentIndex]||{})[num]||'';
      h+=`<div class="blank-item"><span class="blank-num">${num}</span><input class="blank-input" id="fi_${i}" value="${val}" placeholder="填写答案" oninput="setFill(${i})"></div>`;
    });
    area.innerHTML=h;
  }else if(q.type==='match'){
    const am=parseMA(q.answer);
    const left=Object.keys(am);
    const right=shuf(Object.values(am));
    let h='<div class="match-container"><div class="match-col"><div class="match-label">左侧</div>';
    left.forEach((item,idx)=>{
      const con=Object.values(userAnswers[currentIndex]||{}).includes(item);
      h+=`<div class="match-item${con?' connected':''}" onclick="selLeft(this,'${item.replace(/'/g,"\\'")}')"><span class="mi-num">${idx+1}</span>${item}</div>`;
    });
    h+='</div><div class="match-col"><div class="match-label">右侧（点击匹配）</div>';
    right.forEach((opt,idx)=>{
      const ml=Object.keys(userAnswers[currentIndex]||{}).find(k=>(userAnswers[currentIndex]||{})[k]===opt);
      h+=`<div class="match-item${ml?' connected':''}" onclick="selRight(this,'${opt.replace(/'/g,"\\'")}')"><span class="mi-num">${String.fromCharCode(0x41+idx)}</span>${opt}</div>`;
    });
    h+='</div></div>';
    if(!userAnswers[currentIndex])userAnswers[currentIndex]={};
    matchSelected=null;
    area.innerHTML=h;
  }

  document.getElementById('prevBtn').disabled=currentIndex===0;
  const last=currentIndex===total-1;
  document.getElementById('nextBtn').style.display=last?'none':'inline-block';
  document.getElementById('submitBtn').style.display=last?'inline-block':'none';
}

function parseMA(a){const m={};if(!a)return m;a.split(',').forEach(p=>{let[s,t]=p.split('——');if(!t)[s,t]=p.split('→');if(s&&t)m[s.trim()]=t.trim();});return m;}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function selSingle(val){
  userAnswers[currentIndex]=val;
  document.querySelectorAll('.option-btn,.tf-btn').forEach(b=>b.classList.remove('selected'));
  const s=document.querySelector(`.option-btn[onclick*="'${val}'"],.tf-btn[onclick*="'${val}']"`);
  if(s)s.classList.add('selected');
}
function selLeft(el,item){
  matchSelected=item;
  document.querySelectorAll('#answerArea .match-col:first-child .match-item').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function selRight(el,opt){
  if(!matchSelected)return;
  userAnswers[currentIndex][matchSelected]=opt;matchSelected=null;
  document.querySelectorAll('#answerArea .match-col:first-child .match-item').forEach(b=>{
    const t=b.textContent.replace(/^\d+/,'').trim();
    if((userAnswers[currentIndex]||{})[t])b.classList.add('connected');else b.classList.remove('connected','active');
  });
  document.querySelectorAll('#answerArea .match-col:last-child .match-item').forEach(b=>{
    const t=b.textContent.replace(/^[A-Z]\s*/,'').trim();
    const ml=Object.keys(userAnswers[currentIndex]||{}).find(k=>(userAnswers[currentIndex]||{})[k]===t);
    if(ml)b.classList.add('connected');else b.classList.remove('connected');
  });
}
function setFill(i){
  if(!userAnswers[currentIndex])userAnswers[currentIndex]={};
  userAnswers[currentIndex][String.fromCharCode(0x2460+i)]=document.getElementById('fi_'+i).value.trim();
}

function checkAnswer(ua,q){
  if(q.type==='match'){const am=parseMA(q.answer);const ak=Object.keys(am);if(Object.keys(ua||{}).length!==ak.length)return false;return ak.every(k=>ua[k]===am[k]);}
  if(q.type==='fill'){const parts=q.answer.split('|');return parts.every((v,i)=>(ua||{})[String.fromCharCode(0x2460+i)]===v);}
  return ua===q.answer;
}
function getAnsText(ua,q){
  if(q.type==='match'){if(!ua||!Object.keys(ua).length)return'未作答';return Object.entries(ua).map(([k,v])=>`${k}→${v}`).join(', ');}
  if(q.type==='fill'){if(!ua||!Object.keys(ua).length)return'未作答';const parts=q.answer.split('|');return parts.map((v,i)=>{const n=String.fromCharCode(0x2460+i);return`${n}:${(ua||{})[n]||'空'}`;}).join(', ');}
  if(q.type==='judge')return ua==='对'?'正确':ua==='错'?'错误':ua||'未作答';
  if(q.type==='single'){if(!ua)return'未作答';return`${ua}: ${q.options[ua]||ua}`;}
  return ua||'未作答';
}
function getCorText(q){
  if(q.type==='match'){const am=parseMA(q.answer);return Object.entries(am).map(([k,v])=>`${k}→${v}`).join(', ');}
  if(q.type==='fill')return q.answer.replace(/\|/g,' | ');
  if(q.type==='judge')return q.answer==='对'?'正确':q.answer==='错'?'错误':q.answer;
  if(q.type==='single')return`${q.answer}: ${q.options[q.answer]||q.answer}`;
  return q.answer;
}

function prevQuestion(){if(currentIndex>0){currentIndex--;showQuestion();}}
function nextQuestion(){
  const q=currentQuestions[currentIndex],ua=userAnswers[currentIndex];
  if(q.type==='match'){if(!ua||!Object.keys(ua).length){alert('请先完成连线');return;}}
  else if(!ua){alert('请先作答');return;}
  if(currentIndex<currentQuestions.length-1){currentIndex++;showQuestion();}
}
function submitQuiz(){
  const q=currentQuestions[currentIndex],ua=userAnswers[currentIndex];
  if(q.type==='match'){if(!ua||!Object.keys(ua).length){alert('请先完成连线');return;}}
  else if(!ua){alert('请先作答');return;}
  const total=currentQuestions.length;
  let correct=0;currentQuestions.forEach((q,i)=>{if(checkAnswer(userAnswers[i],q))correct++;});
  const acc=Math.round(correct/total*100),el=Math.floor((Date.now()-startTime)/1000),m=Math.floor(el/60),s=el%60;
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  document.getElementById('finalScore').textContent=correct;
  document.getElementById('totalDisplay').textContent='/'+total;
  document.getElementById('correctCount').textContent=correct;
  document.getElementById('wrongCount').textContent=total-correct;
  document.getElementById('accuracy').textContent=acc+'%';
  document.getElementById('timeUsed').textContent=`${m}分${s}秒`;
  document.getElementById('resultMessage').textContent=acc>=90?'🌟 太棒了！':acc>=70?'👍 很不错！':acc>=50?'💪 还需努力！':'📚 加油多练！';
  let rl='';
  currentQuestions.forEach((q,i)=>{
    const ua=userAnswers[i],ok=checkAnswer(ua,q);
    rl+=`<div class="review-item"><span class="num">${i+1}</span><div style="flex:1;"><div style="font-size:.88em;color:#333;margin-bottom:3px;">${q.question.slice(0,60)}${q.question.length>60?'...':''}</div><div class="user-answer ${ok?'right':'wrong'}">你的: <span>${getAnsText(ua,q)}</span></div>${!ok?`<div class="user-answer right">正确: <span>${getCorText(q)}</span></div>`:''}</div><span class="result ${ok?'right':'wrong'}">${ok?'✓':'✗'}</span></div>`;
  });
  document.getElementById('reviewList').innerHTML=rl;
}
function restartQuiz(){
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('startScreen').style.display='block';
}
loadExams();
</script>
</body>
</html>
